
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Update Marks</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-10">

<div class="bg-white shadow-2xl rounded-3xl p-10 w-[600px]">

    <!-- Header -->

    <div class="text-center mb-8">

        <h1 class="text-4xl font-bold text-gray-800 mb-2">
            Update Marks
        </h1>

        <p class="text-gray-500">
            Search and update student marks
        </p>

    </div>

    <!-- Search Form -->

    <form method="GET"
          th:action="@{/findupdatemark}"
          class="space-y-5 mb-10">

        <div>

            <label class="block text-gray-700 font-semibold mb-2">
                Registration No
            </label>

            <input type="text"
                   name="regNo"
                   required
                   class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

        </div>

        <div>

            <label class="block text-gray-700 font-semibold mb-2">
                Subject Code
            </label>

            <input type="text"
                   name="subjectCode"
                   required
                   class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

        </div>

        <button type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 transition duration-300 text-white py-3 rounded-2xl text-lg font-semibold shadow-lg">

            Find Update Marks

        </button>

    </form>

    <!-- Update Form -->

    <div th:if="${mark!=null}">

        <form method="POST"
              th:action="@{/UpdateMarks}"
              class="space-y-5">

            <!-- Hidden Fields -->

            <input type="hidden"
                   name="regNo"
                   th:value="${mark.student.regNo}">

            <input type="hidden"
                   name="id"
                   th:value="${mark.id}">

            <input type="hidden"
                   name="subjectCode"
                   th:value="${mark.subjectCode}">

            <!-- Quiz 01 -->

            <div>

                <label class="block text-gray-700 font-semibold mb-2">
                    Quiz 01
                </label>

                <input type="text"
                       name="Quiz01"
                       th:value="${mark.Quiz01}"
                       required
                       class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-green-500">

            </div>

            <!-- Quiz 02 -->

            <div>

                <label class="block text-gray-700 font-semibold mb-2">
                    Quiz 02
                </label>

                <input type="text"
                       name="Quiz02"
                       th:value="${mark.Quiz02}"
                       required
                       class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-green-500">

            </div>

            <!-- Quiz 03 -->

            <div>

                <label class="block text-gray-700 font-semibold mb-2">
                    Quiz 03
                </label>

                <input type="text"
                       name="Quiz03"
                       th:value="${mark.Quiz03}"
                       required
                       class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-green-500">

            </div>

            <!-- Mid Marks -->

            <div>

                <label class="block text-gray-700 font-semibold mb-2">
                    Mid Marks
                </label>

                <input type="text"
                       name="midMarks"
                       th:value="${mark.midMarks}"
                       required
                       class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-green-500">

            </div>

            <!-- End Marks -->

            <div>

                <label class="block text-gray-700 font-semibold mb-2">
                    End Marks
                </label>

                <input type="text"
                       name="endMarks"
                       th:value="${mark.endMarks}"
                       required
                       class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-green-500">

            </div>

            <!-- Subject Name -->

            <div>

                <label class="block text-gray-700 font-semibold mb-2">
                    Subject Name
                </label>

                <input type="text"
                       name="subjectName"
                       th:value="${mark.subjectName}"
                       required
                       class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-green-500">

            </div>

            <!-- Update Button -->

            <button type="submit"
                    class="w-full bg-green-500 hover:bg-green-600 transition duration-300 text-white py-3 rounded-2xl text-lg font-semibold shadow-lg">

                Update Marks

            </button>

        </form>

    </div>

    <!-- Error Message -->

    <div th:if="${error}"
         class="mt-5 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl">

        <p th:text="${error}"></p>

    </div>

    <!-- Success Message -->

    <div th:if="${success}"
         class="mt-5 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl">

        <p th:text="${success}"></p>

    </div>

</div>

</body>

</html>
