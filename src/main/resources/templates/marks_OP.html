
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Marks Operations | Marks Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatCard {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        body{
            background: linear-gradient(
                    -45deg,
                    #10b981,
                    #059669,
                    #0ea5e9,
                    #2563eb
            );

            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .floating-card{
            animation: floatCard 5s ease-in-out infinite;
            backdrop-filter: blur(20px);
        }

    </style>

</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="floating-card
            bg-white/15
            border border-white/20
            shadow-2xl
            rounded-[32px]
            p-8 md:p-10
            w-full
            max-w-xl">

    <div class="text-center">

        <!-- Icon -->

        <div class="mb-6">

            <div class="w-20 h-20 mx-auto
                        bg-white/20
                        rounded-full
                        flex items-center justify-center
                        text-4xl
                        shadow-lg">

                📊

            </div>

        </div>

        <!-- Title -->

        <h1 class="text-4xl md:text-5xl font-bold text-white mb-3">

            Marks Operations

        </h1>

        <p class="text-white/80 mb-10">

            Manage student marks and academic performance

        </p>

        <!-- Buttons -->

        <div class="space-y-5">

            <a th:href="@{/addmarks}"
               class="block bg-blue-500 hover:bg-blue-600
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                ➕ Add Marks

            </a>

            <a th:href="@{/updatemarks}"
               class="block bg-green-500 hover:bg-green-600
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                ✏️ Update Marks

            </a>

            <a th:href="@{/displayallmarks}"
               class="block bg-purple-500 hover:bg-purple-600
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                📋 Display All Marks

            </a>

            <a th:href="@{/individualmarks}"
               class="block bg-orange-500 hover:bg-orange-600
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                🎯 Individual Student Marks

            </a>

            <a th:href="@{/}"
               class="block bg-gray-700 hover:bg-gray-800
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                🏠 Home

            </a>

        </div>

        <!-- Footer -->

        <div class="mt-10 border-t border-white/20 pt-5">

            <p class="text-white/80 text-sm">

                Marks Management System

            </p>

            <div class="mt-3 inline-flex items-center
                        px-4 py-2
                        bg-white/10
                        rounded-full
                        text-xs
                        text-white/80">

                👨‍💻 Developed by Danuja Illeperuma

            </div>

        </div>

    </div>

</div>

</body>

</html>
