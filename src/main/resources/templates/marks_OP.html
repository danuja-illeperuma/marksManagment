
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Marks Operations</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-3xl p-10 w-[550px]">

    <div class="text-center">

        <h1 class="text-5xl font-bold text-gray-800 mb-10">
            Marks Operations
        </h1>

        <ol class="space-y-5">

            <li>

                <a th:href="@{/addmarks}"
                   class="block bg-blue-500 hover:bg-blue-600 transition duration-300 text-white py-4 rounded-2xl text-lg font-semibold shadow-lg">

                    Add Marks

                </a>

            </li>

            <li>

                <a th:href="@{/updatemarks}"
                   class="block bg-green-500 hover:bg-green-600 transition duration-300 text-white py-4 rounded-2xl text-lg font-semibold shadow-lg">

                    Update Marks

                </a>

            </li>

            <li>

                <a th:href="@{/displayallmarks}"
                   class="block bg-purple-500 hover:bg-purple-600 transition duration-300 text-white py-4 rounded-2xl text-lg font-semibold shadow-lg">

                    Display All Marks

                </a>

            </li>

            <li>

                <a th:href="@{/individualmarks}"
                   class="block bg-orange-500 hover:bg-orange-600 transition duration-300 text-white py-4 rounded-2xl text-lg font-semibold shadow-lg">

                    Display Individual Student Marks

                </a>

            </li>

            <li>

                <a th:href="@{/}"
                   class="block bg-gray-700 hover:bg-gray-800 transition duration-300 text-white py-4 rounded-2xl text-lg font-semibold shadow-lg">

                    Home

                </a>

            </li>

        </ol>

    </div>

</div>

</body>

</html>
