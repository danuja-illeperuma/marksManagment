
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Marks Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes floatCard {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        body {
            background: linear-gradient(
                    -45deg,
                    #2563eb,
                    #7c3aed,
                    #06b6d4,
                    #3b82f6
            );

            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .floating-card {
            animation: floatCard 5s ease-in-out infinite;
            backdrop-filter: blur(20px);
        }

    </style>


    <meta property="og:title"
          content="Student Marks Management System">

    <meta property="og:description"
          content="A web-based student and marks management system developed by Danuja Illeperuma. Manage students, marks, grades and academic records easily.">

    <meta property="og:image"
          content="https://marks-management-system-production.up.railway.app/images/preview.jpeg">

    <meta property="og:url"
          content="https://marks-management-system-production.up.railway.app">

    <meta property="og:type"
          content="website">

    <meta name="twitter:card" content="summary_large_image">

    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/jpeg">

</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="floating-card
            bg-white/15
            border border-white/20
            shadow-2xl
            rounded-[32px]
            p-10
            w-full
            max-w-md">

    <div class="text-center">

        <!-- Logo -->

        <div class="mb-6">

            <div class="w-20 h-20 mx-auto
                        bg-white/20
                        rounded-full
                        flex items-center justify-center
                        text-4xl
                        shadow-lg">

                🎓

            </div>

        </div>

        <!-- Title -->

        <h1 class="text-4xl md:text-5xl font-bold text-white mb-3">

            Welcome

        </h1>

        <p class="text-white/80 text-lg mb-10">

            Marks Management System

        </p>

        <!-- Buttons -->

        <div class="space-y-5">

            <a th:href="@{/student_OP}"
               class="group block
                      bg-white
                      text-blue-600
                      py-4
                      rounded-2xl
                      font-semibold
                      text-lg
                      shadow-xl
                      transition-all
                      duration-300
                      hover:scale-105
                      hover:shadow-2xl">

                <span class="group-hover:tracking-wide transition-all">

                    Student Operation

                </span>

            </a>

            <a th:href="@{/marks_OP}"
               class="group block
                      bg-gradient-to-r
                      from-emerald-500
                      to-green-600
                      text-white
                      py-4
                      rounded-2xl
                      font-semibold
                      text-lg
                      shadow-xl
                      transition-all
                      duration-300
                      hover:scale-105
                      hover:shadow-2xl">

                <span class="group-hover:tracking-wide transition-all">

                    Marks Operation

                </span>

            </a>

        </div>

        <!-- Footer -->

        <div class="mt-10 border-t border-white/20 pt-5 text-center">

            <p class="text-white/80 text-sm">

                University Student Management Portal

            </p>

            <div class="mt-3 inline-flex items-center
                        px-4 py-2
                        bg-white/10
                        rounded-full
                        text-xs
                        text-white/80
                        backdrop-blur-sm">

                👨‍💻 Developed by Danuja Illeperuma

            </div>

        </div>

    </div>

</div>

</body>

</html>
