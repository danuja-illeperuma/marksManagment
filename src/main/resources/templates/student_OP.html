
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Operations | Marks Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatCard {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        body{
            background: linear-gradient(
                    -45deg,
                    #2563eb,
                    #7c3aed,
                    #06b6d4,
                    #3b82f6
            );

            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .floating-card{
            animation: floatCard 5s ease-in-out infinite;
            backdrop-filter: blur(20px);
        }

    </style>

</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="floating-card
            bg-white/15
            border border-white/20
            shadow-2xl
            rounded-[32px]
            p-8 md:p-10
            w-full
            max-w-xl">

    <div class="text-center">

        <!-- Icon -->

        <div class="mb-6">

            <div class="w-20 h-20 mx-auto
                        bg-white/20
                        rounded-full
                        flex items-center justify-center
                        text-4xl
                        shadow-lg">

                🎓

            </div>

        </div>

        <!-- Title -->

        <h1 class="text-4xl md:text-5xl font-bold text-white mb-3">

            Student Operations

        </h1>

        <p class="text-white/80 mb-10">

            Manage student information and records

        </p>

        <!-- Buttons -->

        <div class="space-y-5">

            <a th:href="@{/Add_Student}"
               class="block bg-blue-500 hover:bg-blue-600
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                ➕ Add Student

            </a>

            <a th:href="@{/viewstudent}"
               class="block bg-green-500 hover:bg-green-600
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                👁️ View Student

            </a>

            <a th:href="@{/updateStudent}"
               class="block bg-yellow-500 hover:bg-yellow-600
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                ✏️ Update Student

            </a>

            <a th:href="@{/deletestudent}"
               class="block bg-red-500 hover:bg-red-600
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                🗑️ Delete Student

            </a>

            <a th:href="@{/}"
               class="block bg-gray-700 hover:bg-gray-800
                      transition duration-300
                      text-white py-4 rounded-2xl
                      text-lg font-semibold shadow-xl
                      hover:scale-105">

                🏠 Home

            </a>

        </div>

        <!-- Footer -->

        <div class="mt-10 border-t border-white/20 pt-5">

            <p class="text-white/80 text-sm">

                Marks Management System

            </p>

            <div class="mt-3 inline-flex items-center
                        px-4 py-2
                        bg-white/10
                        rounded-full
                        text-xs
                        text-white/80">

                👨‍💻 Developed by Danuja Illeperuma

            </div>

        </div>

    </div>

</div>

</body>

</html>
