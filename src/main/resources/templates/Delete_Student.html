
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Delete Student</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-3xl p-10 w-[500px]">

    <!-- Header -->

    <div class="text-center mb-8">

        <h1 class="text-4xl font-bold text-gray-800 mb-2">
            Delete Student
        </h1>

        <p class="text-gray-500">
            Enter registration number to delete student
        </p>

    </div>

    <!-- Delete Form -->

    <form method="POST"
          th:action="@{/DeleteStudent}"
          class="space-y-5">

        <div>

            <label class="block text-gray-700 font-semibold mb-2">
                Registration No
            </label>

            <input type="text"
                   name="regNo"
                   class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-red-500">

        </div>

        <!-- Delete Button -->

        <button type="submit"
                class="w-full bg-red-500 hover:bg-red-600 transition duration-300 text-white py-3 rounded-2xl text-lg font-semibold shadow-lg">

            Delete Student

        </button>

    </form>

    <!-- Error Message -->

    <div th:if="${error}"
         class="mt-5 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl">

        <p th:text="${error}"></p>

    </div>

    <!-- Success Message -->

    <div th:if="${success}"
         class="mt-5 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl">

        <p th:text="${success}"></p>

    </div>

</div>

</body>

</html>
