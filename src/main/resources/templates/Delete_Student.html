<html lang="en" xmlns:th="http://thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Delete Student | Marks Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen overflow-y-auto bg-gradient-to-br from-red-600 via-purple-600 to-indigo-700">

<!-- Animated Background -->

<div class="fixed inset-0 overflow-hidden -z-10">

    <div class="absolute top-10 left-10 w-80 h-80 bg-white/10 rounded-full blur-3xl animate-pulse"></div>

    <div class="absolute bottom-10 right-10 w-96 h-96 bg-red-300/10 rounded-full blur-3xl animate-pulse"></div>

    <div class="absolute top-1/2 left-1/2 w-72 h-72 bg-pink-300/10 rounded-full blur-3xl animate-bounce"></div>

</div>

<div class="max-w-2xl mx-auto py-10 px-4">

    <!-- Navigation -->

    <div class="flex flex-wrap gap-3 mb-6">

        <a href="javascript:history.back()"
           class="bg-white/20 backdrop-blur-lg text-white px-5 py-2 rounded-xl hover:bg-white/30 transition">

            ← Back

        </a>

        <a th:href="@{/}"
           class="bg-white/20 backdrop-blur-lg text-white px-5 py-2 rounded-xl hover:bg-white/30 transition">

            🏠 Home

        </a>

    </div>

    <!-- Main Card -->

    <div class="bg-white/15 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-8">

        <!-- Header -->

        <div class="text-center mb-8">

            <div class="text-6xl mb-3">
                🗑️
            </div>

            <h1 class="text-5xl font-bold text-white mb-2">
                Delete Student
            </h1>

            <p class="text-white/80">
                Enter registration number to delete student
            </p>

        </div>

        <!-- Delete Form -->

        <form method="POST"
              th:action="@{/DeleteStudent}"
              class="space-y-5">

            <div>

                <label class="block text-white font-semibold mb-2">
                    Registration Number
                </label>

                <input type="text"
                       name="regNo"
                       placeholder="Enter Registration Number"
                       class="w-full bg-white/90 rounded-xl p-4 focus:outline-none focus:ring-4 focus:ring-red-300">

            </div>

            <!-- Delete Button -->

            <button type="submit"
                    class="w-full bg-red-500 hover:bg-red-600 transition duration-300 text-white py-4 rounded-2xl text-lg font-semibold shadow-lg hover:scale-105" onclick="return confirm('Are you sure you want to delete this student?')">

                Delete Student

            </button>

        </form>

        <!-- Error Message -->

        <div th:if="${error}"
             class="mt-5 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl">

            <p th:text="${error}"></p>

        </div>

        <!-- Success Message -->

        <div th:if="${success}"
             class="mt-5 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl">

            <p th:text="${success}"></p>

        </div>

        <!-- Footer -->

        <div class="mt-8 pt-6 border-t border-white/20 text-center">

            <span class="bg-white/10 px-4 py-2 rounded-full text-white text-sm">
                👨‍💻 Developed by Danuja Illeperuma
            </span>

        </div>

    </div>

</div>

</body>

</html>
