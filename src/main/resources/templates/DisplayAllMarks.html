
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Display All Marks | Marks Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen overflow-y-auto bg-gradient-to-br from-green-600 via-blue-600 to-indigo-700">

<!-- Animated Background -->

<div class="fixed inset-0 overflow-hidden -z-10">

    <div class="absolute top-10 left-10 w-96 h-96 bg-white/10 rounded-full blur-3xl animate-pulse"></div>

    <div class="absolute bottom-10 right-10 w-96 h-96 bg-green-300/10 rounded-full blur-3xl animate-pulse"></div>

    <div class="absolute top-1/2 left-1/2 w-80 h-80 bg-cyan-300/10 rounded-full blur-3xl animate-bounce"></div>

</div>

<div class="max-w-7xl mx-auto py-10 px-4">

    <!-- Navigation -->

    <div class="flex flex-wrap gap-3 mb-6">

        <a href="javascript:history.back()"
           class="bg-white/20 backdrop-blur-lg text-white px-5 py-2 rounded-xl hover:bg-white/30 transition">

            ← Back

        </a>

        <a th:href="@{/}"
           class="bg-white/20 backdrop-blur-lg text-white px-5 py-2 rounded-xl hover:bg-white/30 transition">

            🏠 Home

        </a>

    </div>

    <!-- Header -->

    <div class="text-center mb-10">

        <div class="text-6xl mb-3">
            📊
        </div>

        <h1 class="text-5xl font-bold text-white mb-3">

            Student Marks

        </h1>

        <p class="text-white/80 text-lg">

            Displaying all student marks and grades

        </p>

    </div>

    <!-- Table Card -->

    <div class="bg-white/15 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl overflow-hidden">

        <div class="overflow-x-auto">

            <table class="w-full text-left border-collapse"
                   th:if="${marks != null}">

                <!-- Header -->

                <thead class="bg-white/20 text-white">

                <tr>

                    <th class="p-4">Reg No</th>
                    <th class="p-4">Quiz 01</th>
                    <th class="p-4">Quiz 02</th>
                    <th class="p-4">Quiz 03</th>
                    <th class="p-4">Mid Marks</th>
                    <th class="p-4">End Marks</th>
                    <th class="p-4">Total</th>
                    <th class="p-4">Grade</th>
                    <th class="p-4">Subject Name</th>
                    <th class="p-4">Subject Code</th>

                </tr>

                </thead>

                <!-- Body -->

                <tbody>

                <tr th:each="m : ${marks}"
                    class="border-b border-white/10 hover:bg-white/10 transition">

                    <td class="p-4 font-semibold text-white"
                        th:text="${m.student.regNo}"></td>

                    <td class="p-4 text-white"
                        th:text="${m.Quiz01}"></td>

                    <td class="p-4 text-white"
                        th:text="${m.Quiz02}"></td>

                    <td class="p-4 text-white"
                        th:text="${m.Quiz03}"></td>

                    <td class="p-4 text-white"
                        th:text="${m.midMarks}"></td>

                    <td class="p-4 text-white"
                        th:text="${m.endMarks}"></td>

                    <td class="p-4 font-bold text-yellow-300"
                        th:text="${m.totalMarks}"></td>

                    <td class="p-4 font-bold text-green-300"
                        th:text="${m.grade}"></td>

                    <td class="p-4 text-white"
                        th:text="${m.subjectName}"></td>

                    <td class="p-4 text-white"
                        th:text="${m.subjectCode}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <!-- Footer -->

    <div class="mt-8 text-center">

        <span class="bg-white/10 px-4 py-2 rounded-full text-white text-sm">

            👨‍💻 Developed by Danuja Illeperuma

        </span>

    </div>

</div>

</body>

</html>
