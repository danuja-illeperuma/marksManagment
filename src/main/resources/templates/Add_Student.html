
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Student | Marks Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body{
            background: linear-gradient(
                    -45deg,
                    #2563eb,
                    #7c3aed,
                    #06b6d4,
                    #3b82f6
            );

            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

    </style>

</head>

<body class="min-h-screen overflow-y-auto bg-gradient-to-br from-blue-600 via-purple-600 to-indigo-700 relative">

<!-- Animated Background -->
<div class="absolute inset-0 overflow-hidden -z-10">

    <div class="absolute w-96 h-96 bg-white/10 rounded-full blur-3xl top-10 left-10 animate-pulse"></div>

    <div class="absolute w-96 h-96 bg-pink-400/10 rounded-full blur-3xl bottom-10 right-10 animate-pulse"></div>

    <div class="absolute w-72 h-72 bg-cyan-400/10 rounded-full blur-3xl top-1/2 left-1/2 animate-bounce"></div>

</div>

<div class="max-w-2xl mx-auto py-10 px-4">

    <!-- Navigation Buttons -->

    <div class="flex flex-wrap gap-3 mb-6">

        <a href="javascript:history.back()"
           class="bg-white/20 backdrop-blur-lg text-white px-5 py-2 rounded-xl hover:bg-white/30 transition">

            ← Back

        </a>

        <a th:href="@{/}"
           class="bg-white/20 backdrop-blur-lg text-white px-5 py-2 rounded-xl hover:bg-white/30 transition">

            🏠 Home

        </a>

    </div>

    <!-- Main Card -->

    <div class="bg-white/15 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-8">

        <div class="text-center mb-8">

            <div class="text-6xl mb-4">
                🎓
            </div>

            <h1 class="text-5xl font-bold text-white mb-2">
                Add Student
            </h1>

            <p class="text-white/80">
                Enter student information
            </p>

        </div>

        <form method="POST"
              th:action="@{/saveStudent}"
              class="space-y-5">

            <!-- Registration Number -->

            <div>

                <label class="block text-white font-semibold mb-2">
                    Registration Number
                </label>

                <input type="text"
                       name="regNo"
                       class="w-full rounded-xl p-4 bg-white/90 focus:outline-none focus:ring-4 focus:ring-white/50">

            </div>

            <!-- Student Name -->

            <div>

                <label class="block text-white font-semibold mb-2">
                    Student Name
                </label>

                <input type="text"
                       name="Name"
                       placeholder="Enter Student Name"
                       required
                       class="w-full rounded-xl p-4 bg-white/90 focus:outline-none focus:ring-4 focus:ring-white/50">

            </div>

            <!-- Date of Birth -->

            <div>

                <label class="block text-white font-semibold mb-2">
                    Date Of Birth
                </label>

                <input type="date"
                       name="Dob"
                       class="w-full rounded-xl p-4 bg-white/90 focus:outline-none focus:ring-4 focus:ring-white/50">

            </div>

            <!-- Email -->

            <div>

                <label class="block text-white font-semibold mb-2">
                    Email
                </label>

                <input type="email"
                       name="Email"
                       class="w-full rounded-xl p-4 bg-white/90 focus:outline-none focus:ring-4 focus:ring-white/50">

            </div>

            <!-- Contact -->

            <div>

                <label class="block text-white font-semibold mb-2">
                    Contact Number
                </label>

                <input type="text"
                       name="Contact"
                       class="w-full rounded-xl p-4 bg-white/90 focus:outline-none focus:ring-4 focus:ring-white/50">

            </div>

            <!-- Submit -->

            <button type="submit"
                    class="w-full bg-white text-blue-600 py-4 rounded-2xl text-lg font-bold hover:scale-105 transition">

                Save Student

            </button>

        </form>

        <!-- Error Message -->

        <div th:if="${error}"
             class="mt-5 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl">

            <p th:text="${error}"></p>

        </div>

        <!-- Success Message -->

        <div th:if="${success}"
             class="mt-5 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl">

            <p th:text="${success}"></p>

        </div>

        <!-- Footer -->

        <div class="mt-8 pt-6 border-t border-white/20 text-center">

            <span class="bg-white/10 px-4 py-2 rounded-full text-white text-sm">
                👨‍💻 Developed by Danuja Illeperuma
            </span>

        </div>

    </div>

</div>

</body>

</html>
